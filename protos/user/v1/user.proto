syntax = "proto3";
package user.v1;
option go_package = "example.com/monorepo/gen/go/user/v1;userpb";

import "google/protobuf/timestamp.proto";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}

// CreateUser creates a new user
message CreateUserRequest {
  string email = 1;
  string password = 2; // Plain text password (will be hashed server-side)
}

message CreateUserResponse {
  string user_id = 1;
  string email = 2;
  google.protobuf.Timestamp created_at = 3;
}

// GetUser retrieves a user by ID
message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  string user_id = 1;
  string email = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
}

// UpdateUser updates user information (partial updates supported)
message UpdateUserRequest {
  string user_id = 1;
  optional string email = 2; // Optional: only update if provided
  optional string password = 3; // Optional: only update if provided
}

message UpdateUserResponse {
  string user_id = 1;
  string email = 2;
  google.protobuf.Timestamp updated_at = 3;
}

// DeleteUser removes a user
message DeleteUserRequest {
  string user_id = 1;
}

message DeleteUserResponse {
  bool success = 1;
}
